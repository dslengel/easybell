<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirk Büchin | Zertifizierter easybell Partner Saarbrücken</title>
    
    <!-- React & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel für JSX-Support im Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .lucide {
            vertical-align: middle;
            display: inline-block;
        }

        /* Partner Logo Style */
        .partner-logo-box {
            border: 2px solid #003366;
            color: #003366;
            font-style: italic;
            font-weight: 900;
            padding: 2px 12px;
            font-size: 1.25rem;
            line-height: 1;
        }
        .partner-label {
            background-color: #003366;
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 0;
            width: 100%;
            text-align: center;
        }
        
        .tab-active {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
        }

        /* Chat Animations */
        .chat-bubble {
            animation: fadeInScale 0.3s ease-out;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 50%;
            animation: typing 1s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API Konfiguration
        const apiKey = ""; // Wird zur Laufzeit bereitgestellt
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        // Hilfskomponente für Lucide-Icons
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return (
                <i 
                    data-lucide={name} 
                    className={className}
                    style={{ width: size, height: size }}
                ></i>
            );
        };

        // --- KI BERATER KOMPONENTE ---
        const AiAdvisor = ({ isOpen, setIsOpen }) => {
            const [messages, setMessages] = useState([
                { role: 'assistant', text: 'Hallo! Ich bin Ihr ✨ KI-Tarifberater. Wie viele Mitarbeiter hat Ihr Unternehmen und was ist Ihnen bei der Telefonie besonders wichtig?' }
            ]);
            const [inputValue, setInputValue] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping]);

            const callGemini = async (userQuery) => {
                setIsTyping(true);
                const systemPrompt = `Du bist ein fachkundiger KI-Tarifberater für Dirk Büchin (IT-Consulting Saarbrücken), ein zertifizierter easybell Partner. 
                Nutze folgende Fakten für deine Beratung:
                - Dirk Büchin bietet Vor-Ort Service in Saarbrücken & Umland an.
                - Cloud PBX: Basic (0€, 5 Nebenstellen), Classic (ab 9,95€, bis 600 Nebenstellen), Pro (ab 14,95€, inkl. Analytics & Call Flow Creator).
                - SIP Trunks: Business 2 (1,95€), Business 10 (4,95€), Business 50 (19,95€). 
                - Microsoft Teams Integration (Teams Connector) für 0,50€ pro Account/Monat.
                - Office Komplett (VDSL/Glasfaser + SIP Trunk) ab 29,95€.
                - Alle Tarife sind monatlich kündbar (keine Mindestlaufzeit).
                - Sicherheit: Betrugsschutz-Garantie (max 10€ Schaden), Hosting nur in Deutschland.
                Antworte freundlich, professionell und auf Deutsch. Empfiehl immer den passendsten Tarif basierend auf den Angaben des Nutzers. Wenn es technisch wird, verweise auf ein Beratungsgespräch mit Dirk Büchin.`;

                let retries = 0;
                const delays = [1000, 2000, 4000, 8000, 16000];

                const fetchWithRetry = async () => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });

                        if (!response.ok) throw new Error("API Fehler");
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (retries < 5) {
                            await new Promise(res => setTimeout(res, delays[retries]));
                            retries++;
                            return fetchWithRetry();
                        }
                        throw err;
                    }
                };

                try {
                    const result = await fetchWithRetry();
                    setMessages(prev => [...prev, { role: 'assistant', text: result || "Entschuldigung, ich konnte keine Antwort generieren." }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', text: "Leider gibt es gerade ein technisches Problem. Bitte versuchen Sie es später erneut oder kontaktieren Sie Dirk Büchin direkt." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!inputValue.trim() || isTyping) return;
                
                const userMsg = inputValue.trim();
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setInputValue("");
                callGemini(userMsg);
            };

            return (
                <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
                    {isOpen && (
                        <div className="mb-4 w-[350px] sm:w-[400px] h-[500px] bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col chat-bubble">
                            <div className="bg-blue-900 p-4 text-white flex justify-between items-center">
                                <div className="flex items-center space-x-2">
                                    <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                                        <Icon name="bot" size={18} />
                                    </div>
                                    <div>
                                        <p className="font-bold text-sm">✨ KI-Tarifberater</p>
                                        <p className="text-[10px] opacity-70">Experte für Dirk Büchin & easybell</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="hover:bg-white/10 p-1 rounded-lg transition-colors">
                                    <Icon name="x" size={20} />
                                </button>
                            </div>

                            <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-50">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-3 rounded-2xl text-sm ${
                                            msg.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-tr-none' 
                                            : 'bg-white text-slate-700 shadow-sm border border-slate-100 rounded-tl-none'
                                        }`}>
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 flex space-x-1">
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            <form onSubmit={handleSubmit} className="p-4 border-t bg-white flex space-x-2">
                                <input 
                                    type="text" 
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    placeholder="Ihre Frage (z.B. 10 Mitarbeiter...)" 
                                    className="flex-grow px-4 py-2 bg-slate-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
                                />
                                <button type="submit" disabled={isTyping} className="bg-blue-600 text-white p-2 rounded-xl hover:bg-blue-700 transition-colors disabled:opacity-50">
                                    <Icon name="send" size={18} />
                                </button>
                            </form>
                        </div>
                    )}
                    
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all"
                    >
                        <Icon name={isOpen ? "chevron-down" : "sparkles"} size={28} />
                    </button>
                </div>
            );
        };

        const App = () => {
            const [activeServiceTab, setActiveServiceTab] = useState('cloud');
            const [isChatOpen, setIsChatOpen] = useState(false);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <div className="min-h-screen">
                    <AiAdvisor isOpen={isChatOpen} setIsOpen={setIsChatOpen} />
                    {/* --- Navigationsleiste --- */}
                    <nav className="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-20 items-center">
                                <div className="flex items-center space-x-3">
                                    <div className="flex flex-col">
                                        <span className="text-xl font-bold tracking-tight text-blue-900 underline decoration-blue-600/20">Dirk Büchin</span>
                                        <span className="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">IT-Consulting Saarbrücken</span>
                                    </div>
                                </div>
                                
                                <div className="hidden lg:flex space-x-8 items-center">
                                    <button onClick={() => scrollToSection('services')} className="text-slate-600 hover:text-blue-600 font-semibold transition-colors">Tarife & Technik</button>
                                    <button onClick={() => scrollToSection('teams')} className="text-slate-600 hover:text-blue-600 font-semibold transition-colors">MS Teams</button>
                                    <button onClick={() => scrollToSection('security')} className="text-slate-600 hover:text-blue-600 font-semibold transition-colors">Sicherheit</button>
                                    <button 
                                        onClick={() => scrollToSection('contact')}
                                        className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md active:scale-95 flex items-center space-x-2"
                                    >
                                        <span>Anfrage senden</span>
                                    </button>
                                </div>

                                <div className="flex items-center border-l pl-6 border-slate-200 ml-4 scale-90">
                                    <div className="flex flex-col items-center">
                                        <div className="partner-label">Zertifizierter Partner</div>
                                        <div className="partner-logo-box">easybell</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* --- Hero Section --- */}
                    <header className="relative bg-white overflow-hidden py-16 md:py-24 border-b border-slate-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <div>
                                    <div className="inline-flex items-center space-x-2 bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold mb-8">
                                        <Icon name="map-pin" size={16} />
                                        <span>Vor-Ort Service in Saarbrücken & Umland</span>
                                    </div>
                                    <h1 className="text-4xl md:text-6xl font-extrabold text-slate-900 leading-tight mb-6">
                                        Professionelle Telefonie <br/>
                                        <span className="text-blue-600 italic">ohne Stress.</span>
                                    </h1>
                                    <p className="text-xl text-slate-600 mb-10 leading-relaxed max-w-lg">
                                        Als offizieller easybell Partner unterstützt Sie Dirk Büchin bei der Digitalisierung Ihrer Kommunikation. Fair, transparent und ohne Mindestvertragslaufzeit.
                                    </p>
                                    <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4 mb-10">
                                        <button 
                                            onClick={() => scrollToSection('services')}
                                            className="flex items-center justify-center space-x-2 bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg"
                                        >
                                            <span>Tarife entdecken</span>
                                            <Icon name="arrow-right" size={20} />
                                        </button>
                                        <button 
                                            onClick={() => setIsChatOpen(true)}
                                            className="flex items-center justify-center space-x-2 bg-white border-2 border-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-bold text-lg hover:border-blue-600 hover:text-blue-600 transition-all group"
                                        >
                                            <span>✨ KI-Beratung</span>
                                        </button>
                                    </div>
                                    <div className="flex items-center space-x-4 text-slate-400">
                                        <div className="flex -space-x-2">
                                            {[1,2,3].map(i => (
                                                <div key={i} className="w-10 h-10 rounded-full bg-slate-100 border-2 border-white flex items-center justify-center">
                                                    <Icon name="user" size={18} />
                                                </div>
                                            ))}
                                        </div>
                                        <span className="text-sm font-medium italic">Vertrauen von hunderten Geschäftskunden</span>
                                    </div>
                                </div>
                                
                                {/* Der gewünschte Ansicht-Stil (Gradient Border & Rotate) */}
                                <div className="relative">
                                    <div className="bg-gradient-to-tr from-blue-600 to-indigo-400 rounded-3xl p-1 shadow-2xl rotate-1">
                                        <div className="bg-white rounded-[1.4rem] p-8 md:p-12">
                                            <h3 className="text-2xl font-bold mb-6 flex items-center text-blue-900">
                                                <Icon name="zap" className="text-yellow-500 mr-2" size={24} /> 
                                                Warum easybell?
                                            </h3>
                                            <ul className="space-y-4 font-medium">
                                                {[
                                                    "Keine Mindestvertragslaufzeit",
                                                    "SIP Trunks mit hoher Kompatibilität",
                                                    "Cloud PBX für maximale Flexibilität",
                                                    "Faire Preise & transparente Abrechnung",
                                                    "Hervorragende Sprachqualität (HD-Audio)"
                                                ].map((item, idx) => (
                                                    <li key={idx} className="flex items-start space-x-3 text-slate-700">
                                                        <Icon name="check-circle" className="text-green-500 mt-1 flex-shrink-0" size={20} />
                                                        <span>{item}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                            <div className="mt-8 pt-8 border-t border-slate-100 italic text-slate-500 text-sm">
                                                "Wir begleiten Sie von der Planung bis zur fertigen Einrichtung Ihrer VoIP-Umgebung."
                                            </div>
                                        </div>
                                    </div>
                                    <div className="absolute -top-10 -right-10 w-40 h-40 bg-blue-100/50 rounded-full blur-3xl -z-10"></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* --- Service Tabs (Umfangreiche Infos aus Flyern) --- */}
                    <section id="services" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Lösungen & Tarife</h2>
                                <p className="text-slate-600 max-w-2xl mx-auto text-lg leading-relaxed">
                                    Von VDSL mit Bandbreitengarantie bis zur hochskalierbaren Cloud-Telefonanlage.
                                </p>
                            </div>

                            <div className="flex flex-wrap justify-center gap-4 mb-16">
                                <button 
                                    onClick={() => setActiveServiceTab('cloud')}
                                    className={`px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${activeServiceTab === 'cloud' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    Cloud Telefonanlage
                                </button>
                                <button 
                                    onClick={() => setActiveServiceTab('sip')}
                                    className={`px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${activeServiceTab === 'sip' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    SIP Trunks
                                </button>
                                <button 
                                    onClick={() => setActiveServiceTab('office')}
                                    className={`px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${activeServiceTab === 'office' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    Office Komplett
                                </button>
                            </div>

                            {activeServiceTab === 'cloud' && (
                                <div className="grid md:grid-cols-3 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="bg-slate-50 p-8 rounded-[2rem] border border-slate-100">
                                        <div className="bg-white inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase text-slate-500 mb-6 border border-slate-200">Basic</div>
                                        <h4 className="text-2xl font-bold mb-4">Dauerhaft kostenlos</h4>
                                        <ul className="space-y-4 mb-10 text-slate-600">
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} className="text-blue-600" /> <span>Bis zu 5 Seats</span></li>
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} className="text-blue-600" /> <span>Intuitives Browser-Interface</span></li>
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} className="text-blue-600" /> <span>Klassische Telefonie & AB</span></li>
                                        </ul>
                                        <div className="text-3xl font-black text-blue-900 pt-6 border-t border-slate-200">0 € / Monat*</div>
                                    </div>
                                    <div className="bg-blue-600 p-8 rounded-[2rem] text-white transform md:scale-105 shadow-2xl">
                                        <div className="bg-blue-500 inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase mb-6 italic">Empfehlung</div>
                                        <h4 className="text-2xl font-bold mb-4">Cloud PBX Classic</h4>
                                        <ul className="space-y-4 mb-10">
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} /> <span>Rufgruppen & BLF</span></li>
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} /> <span>IVR Sprachmenüs</span></li>
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} /> <span>Bis zu 600 Nebenstellen</span></li>
                                        </ul>
                                        <div className="text-3xl font-black pt-6 border-t border-blue-500">ab 9,95 € / Monat*</div>
                                    </div>
                                    <div className="bg-slate-900 p-8 rounded-[2rem] text-white">
                                        <div className="bg-slate-800 inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase text-slate-400 mb-6">Expert</div>
                                        <h4 className="text-2xl font-bold mb-4">Cloud PBX Pro</h4>
                                        <ul className="space-y-4 mb-10 text-slate-300">
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} className="text-blue-400" /> <span>Call Flow Creator</span></li>
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} className="text-blue-400" /> <span>Analytics zur Optimierung</span></li>
                                            <li className="flex items-center space-x-2"><Icon name="check" size={18} className="text-blue-400" /> <span>Desktop Client inklusive</span></li>
                                        </ul>
                                        <div className="text-3xl font-black pt-6 border-t border-slate-800 text-blue-400">ab 14,95 € / Monat*</div>
                                    </div>
                                </div>
                            )}

                            {activeServiceTab === 'sip' && (
                                <div className="grid md:grid-cols-3 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="bg-white p-8 rounded-[2rem] border-2 border-slate-100 text-center">
                                        <Icon name="phone" className="text-blue-600 mb-4 mx-auto" size={32} />
                                        <h4 className="text-2xl font-bold mb-2">Business 2</h4>
                                        <p className="text-slate-500 text-sm mb-6 leading-relaxed">2 Sprachkanäle, 2 virtuelle Durchwahlen. 6 Monate gratis*.</p>
                                        <div className="text-3xl font-black text-blue-900">1,95 € / Monat*</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border-2 border-slate-100 text-center">
                                        <Icon name="phone" className="text-blue-600 mb-4 mx-auto" size={32} />
                                        <h4 className="text-2xl font-bold mb-2">Business 10</h4>
                                        <p className="text-slate-500 text-sm mb-6 leading-relaxed">10 Sprachkanäle, 10 virtuelle Durchwahlen. SIP-DDI inklusive.</p>
                                        <div className="text-3xl font-black text-blue-900">4,95 € / Monat*</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border-2 border-slate-100 text-center">
                                        <Icon name="phone" className="text-blue-600 mb-4 mx-auto" size={32} />
                                        <h4 className="text-2xl font-bold mb-2">Business 50</h4>
                                        <p className="text-slate-500 text-sm mb-6 leading-relaxed">50 Sprachkanäle, 100 virtuelle Durchwahlen. Profi-Lösung.</p>
                                        <div className="text-3xl font-black text-blue-900">19,95 € / Monat*</div>
                                    </div>
                                </div>
                            )}

                            {activeServiceTab === 'office' && (
                                <div className="bg-slate-50 p-10 md:p-16 rounded-[3rem] animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="grid md:grid-cols-2 gap-16 items-center">
                                        <div>
                                            <h3 className="text-3xl font-extrabold mb-6 italic tracking-tight">Internet & Telefonie im Paket</h3>
                                            <p className="text-slate-600 mb-8 text-lg">Kombinieren Sie VDSL Vectoring oder FTTH-Glasfaser (bis 1000 Mbit/s) mit einem durchwahlfähigen SIP Trunk.</p>
                                            <div className="space-y-4">
                                                <div className="flex items-center space-x-3 font-bold text-blue-900"><Icon name="check" size={20} className="text-green-500"/> <span>Bandbreitengarantie</span></div>
                                                <div className="flex items-center space-x-3 font-bold text-blue-900"><Icon name="check" size={20} className="text-green-500"/> <span>Unterbrechungsfreier Wechsel</span></div>
